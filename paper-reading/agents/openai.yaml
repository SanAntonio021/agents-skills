interface:
  display_name: "论文下载与总结"
  short_description: "获取论文 PDF、维护索引并生成单篇中文总结"
  default_prompt: "Use $paper-reading to find or download paper PDFs through open or authorized access first, keep download_list.md and paper_index.md updated, and create a Chinese single-paper summary in paper-summaries when requested."

dependencies:
  tools:
    - type: "mcp"
      value: "paper-search-mcp"
      description: "Search academic metadata and download open-access or authorized PDFs before falling back to browser-based retrieval."
      transport: "stdio"

policy:
  allow_implicit_invocation: true

interface:
  display_name: "论文下载"
  short_description: "下载正式论文 PDF，区分正式版和预印本，并维护索引"
  default_prompt: "Use $paper-download to find or download paper PDFs through open or authorized access, keep paper_index.md updated, and prefer formal published versions over preprints."

dependencies:
  tools:
    - type: "mcp"
      value: "paper-search-mcp"
      description: "Search academic metadata and download open-access or authorized PDFs before falling back to browser-based retrieval."
      transport: "stdio"

policy:
  allow_implicit_invocation: true

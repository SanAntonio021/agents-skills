interface:
  display_name: "对话收尾整理"
  short_description: "从当前对话提炼经验，判断去向；在收尾时同步 README/AGENTS/CLAUDE，归档中间文件和旧材料，最后给清理清单与 Git 状态"
  default_prompt: "Use $chat-notes to close out this conversation: extract reusable lessons, check local and public skill overlap, decide whether the lessons belong in the current project, an existing skill, a new skill, or nowhere, and return only a review draft until the user approves skill/global-rule edits. When the user asks to tidy up, close out, /neat, or finish a stage, also synchronize README/AGENTS/CLAUDE as appropriate, flatten non-code project files into README.md, doc-*, record-*, and output-* names, move intermediate files, stale notes, and suspected junk into archive/cleanup-YYYYMMDD/ with a manifest, update .gitignore for archive/cleanup-*, and report the cleanup plus git status for review. If a skill was formally created or modified, compare it against current skill-creator requirements, fill missing SKILL.md/evals gaps when needed, then find the real source repo, do git checks there, safely push allowed changes when conditions allow, and remind the user to click cc-switch's check-for-updates button manually."

interface:
  display_name: "对话收尾整理"
  short_description: "从当前对话提炼经验并记录踩坑教训，判断去向；收尾时扫描 git diff 同步文档，归档中间文件，给清理清单与 Git 状态"
  default_prompt: "Use $chat-notes to close out this conversation: extract reusable lessons — use concrete triage signals (undocumented fixes, multi-attempt integrations, patterns that turned out cross-project, time-saving workflow sequences) to judge whether they belong in the current project, an existing skill, a new skill, or nowhere — and return only a review draft until the user approves. Record pitfalls encountered during the session (what went wrong, why, how to avoid next time) in a '踩坑记录' section of the output. If the directory is a git repo, run git status/diff to identify changed files and cross-check against references/change-impact-mapping.md for doc-sync gaps. When the user asks to tidy up, close out, /neat, or finish a stage, also synchronize README/AGENTS/CLAUDE as appropriate, flatten non-code project files into doc-*, record-*, output-* names per references/project-entry-standard.md, move intermediate files and suspected junk into archive/cleanup-YYYYMMDD/ with a manifest, update .gitignore, and report cleanup plus git status. If a skill was formally modified, compare against skill-creator requirements, fill gaps, push safely, and remind the user to click cc-switch check-for-updates."
